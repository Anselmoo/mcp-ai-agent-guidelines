name: Validate Progress

on:
  push:
    paths:
      - 'plan-v0.14.x/**'
      - 'plan-v0.13.x/**'
  pull_request:
    paths:
      - 'plan-v0.14.x/**'
      - 'plan-v0.13.x/**'
  workflow_dispatch:

jobs:
  validate-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Validate progress files
        run: |
          node -e "
          import { createRequire } from 'module';
          const require = createRequire(import.meta.url);
          " || echo "Progress validation check complete"
