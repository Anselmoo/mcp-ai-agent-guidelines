# Link Checker — validates external links in markdown files weekly and on demand.
# Uses lychee for comprehensive link validation with caching.

name: Link Checker

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/link-checker.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.md"
  schedule:
    # Weekly Monday 08:00 UTC — catches links that rot over time
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    name: Check links (Lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,206,301,302,307,308,403,429
            --timeout 20
            --max-retries 3
            --scheme https
            --scheme http
            --scheme file
            --scheme mailto
            --exclude 'https://img\.shields\.io'
            --exclude 'https://insiders\.vscode\.dev'
            --exclude 'http://localhost'
            '**.md'
          fail: true

      - name: Save lychee cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
