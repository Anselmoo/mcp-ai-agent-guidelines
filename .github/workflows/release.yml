name: Release

# Triggered by semver tags (v*.*.*) pushed to the repository.
# Runs full CI first, then publishes NPM, builds+pushes Docker, and creates a GitHub Release.
# Docker :latest is also built on every push to main (no NPM publish, no GH release).

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build & publish NPM package ──────────────────────────────────────────
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: npm
      url: https://www.npmjs.com/package/mcp-ai-agent-guidelines
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing — no token needed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm ≥ 11.5.1
      - name: Update npm to latest
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to NPM (OIDC provenance)
        run: npm publish --access public --provenance

  # ── 2. Build & push Docker image ─────────────────────────────────────────────
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write  # Cosign keyless signing

    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with Cosign (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── 3. Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-npm, build-docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write  # Sigstore artifact signing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & pack NPM tarball
        run: npm run build && npm pack

      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --package-lock-only --omit dev > sbom.json

      - name: Sign tarball with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: "*.tgz"

      - name: Extract version from tag
        id: ver
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ steps.ver.outputs.tag }}' \
            --repo '${{ github.repository }}' \
            --title 'v${{ steps.ver.outputs.version }}' \
            --notes "## mcp-ai-agent-guidelines v${{ steps.ver.outputs.version }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Installation

          \`\`\`bash
          npx mcp-ai-agent-guidelines@${{ steps.ver.outputs.version }}
          \`\`\`

          ### Docker

          \`\`\`bash
          docker run ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
          \`\`\`

          Platforms: \`linux/amd64\`, \`linux/arm64\` — images signed with Cosign."

      - name: Upload signed tarball to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload '${{ steps.ver.outputs.tag }}' *.tgz *.sigstore.json sbom.json --repo '${{ github.repository }}'
