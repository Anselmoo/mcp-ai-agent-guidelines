name: Validate Schema Examples

on:
  push:
    paths:
      - 'src/**/*.ts'
      - 'artifacts/**'
  pull_request:
    paths:
      - 'src/**/*.ts'
      - 'artifacts/**'
  workflow_dispatch:

jobs:
  validate-schema-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Validate tool descriptions CSV exists
        run: |
          if [ -f "artifacts/tool-descriptions.csv" ]; then
            echo "✅ tool-descriptions.csv found"
            wc -l artifacts/tool-descriptions.csv
          else
            echo "⚠️  artifacts/tool-descriptions.csv not found (run: npm run export:descriptions)"
          fi
