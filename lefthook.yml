pre-commit:
  commands:
    biome-check:
      run: npm run check
      stage: [all]
    rrt-branch-name:
      run: uvx --from repo-release-tools rrt-hooks check-branch-name --branch "$(git rev-parse --abbrev-ref HEAD)"

commit-msg:
  commands:
    rrt-commit-subject:
      run: uvx --from repo-release-tools rrt-hooks commit-msg {1}
