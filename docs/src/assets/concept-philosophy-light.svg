<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320" role="img"
    aria-label="Six design pillars: No Anti-Bodies, Autonomous Loops, Unbiased Review, Zero Legacy Debt, Implementation over Intuition, Physics-Driven">
    <title>Six Design Pillars</title>

    <!-- Background -->
    <rect width="580" height="320" rx="8" fill="#f5f3ff" />

    <!-- Caligo-teal edge connectors between the 6 hex tiles -->
    <line x1="198" y1="80" x2="290" y2="80" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="388" y1="80" x2="480" y2="80" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="198" y1="240" x2="290" y2="240" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="388" y1="240" x2="480" y2="240" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="100" y1="110" x2="100" y2="200" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="290" y1="110" x2="290" y2="200" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />
    <line x1="480" y1="110" x2="480" y2="200" stroke="#00d4cc" stroke-width="1" stroke-opacity="0.45"
        stroke-dasharray="4,3" />

    <!-- ══ Pillar 1: No Anti-Bodies  (col 1, row 1) cx=100 cy=80 ══ -->
    <polygon points="100,42 134,62 134,102 100,122 66,102 66,62" fill="#00d4cc" fill-opacity="0.08" stroke="#00d4cc"
        stroke-width="1.2" stroke-opacity="0.55" />
    <text x="100" y="77" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#00a89e"
        text-anchor="middle">No</text>
    <text x="100" y="90" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#00a89e"
        text-anchor="middle">Anti-Bodies</text>
    <text x="100" y="107" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">zero-trust defaults</text>

    <!-- ══ Pillar 2: Autonomous Loops  (col 2, row 1) cx=290 cy=80 ══ -->
    <polygon points="290,42 324,62 324,102 290,122 256,102 256,62" fill="#00d4cc" fill-opacity="0.08" stroke="#00d4cc"
        stroke-width="1.2" stroke-opacity="0.55" />
    <text x="290" y="77" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#00a89e"
        text-anchor="middle">Autonomous</text>
    <text x="290" y="90" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#00a89e"
        text-anchor="middle">Loops</text>
    <text x="290" y="107" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">self-directed iteration</text>

    <!-- ══ Pillar 3: Unbiased Review  (col 3, row 1) cx=480 cy=80 ══ -->
    <polygon points="480,42 514,62 514,102 480,122 446,102 446,62" fill="#3b9cf6" fill-opacity="0.08" stroke="#3b9cf6"
        stroke-width="1.2" stroke-opacity="0.55" />
    <text x="480" y="77" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#2a78e0"
        text-anchor="middle">Unbiased</text>
    <text x="480" y="90" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700" fill="#2a78e0"
        text-anchor="middle">Review</text>
    <text x="480" y="107" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">cross-model critique</text>

    <!-- Row label mid-connector -->
    <line x1="134" y1="80" x2="256" y2="80" stroke="#00d4cc" stroke-width="0.8" stroke-opacity="0.28"
        stroke-dasharray="3,4" />
    <line x1="324" y1="80" x2="446" y2="80" stroke="#00d4cc" stroke-width="0.8" stroke-opacity="0.28"
        stroke-dasharray="3,4" />

    <!-- ══ Pillar 4: Zero Legacy Debt  (col 1, row 2) cx=100 cy=240 ══ -->
    <polygon points="100,202 134,222 134,262 100,282 66,262 66,222" fill="#ffa659" fill-opacity="0.08" stroke="#ffa659"
        stroke-width="1.2" stroke-opacity="0.55" />
    <text x="100" y="237" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#ca7a3a" text-anchor="middle">Zero</text>
    <text x="100" y="250" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#ca7a3a" text-anchor="middle">Legacy Debt</text>
    <text x="100" y="267" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">no untested carry-over</text>

    <!-- ══ Pillar 5: Implementation over Intuition  (col 2, row 2) cx=290 cy=240 ══ -->
    <polygon points="290,202 324,222 324,262 290,282 256,262 256,222" fill="#ffa659" fill-opacity="0.08"
        stroke="#ffa659" stroke-width="1.2" stroke-opacity="0.55" />
    <text x="290" y="233" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#ca7a3a" text-anchor="middle">Implementation</text>
    <text x="290" y="246" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#ca7a3a" text-anchor="middle">over Intuition</text>
    <text x="290" y="263" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">empirical over heuristic</text>

    <!-- ══ Pillar 6: Physics-Driven  (col 3, row 2) cx=480 cy=240 ══ -->
    <polygon points="480,202 514,222 514,262 480,282 446,262 446,222" fill="#d8d94b" fill-opacity="0.10"
        stroke="#d8d94b" stroke-width="1.2" stroke-opacity="0.55" />
    <text x="480" y="237" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#9a9b1e" text-anchor="middle">Physics-</text>
    <text x="480" y="250" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700"
        fill="#9a9b1e" text-anchor="middle">Driven</text>
    <text x="480" y="267" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6.5" fill="#475569"
        text-anchor="middle">qm-* + gr-* skill axes</text>

    <!-- Row mid-connectors row 2 -->
    <line x1="134" y1="240" x2="256" y2="240" stroke="#00d4cc" stroke-width="0.8" stroke-opacity="0.28"
        stroke-dasharray="3,4" />
    <line x1="324" y1="240" x2="446" y2="240" stroke="#00d4cc" stroke-width="0.8" stroke-opacity="0.28"
        stroke-dasharray="3,4" />
</svg>